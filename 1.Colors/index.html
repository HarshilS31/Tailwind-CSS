<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1> Adding colors using TailWind CSS</h1>
    <p class="text-green-100">Hello</p>
    <p class="text-green-200">Hello</p>
    <p class="text-green-300">Hello</p>
    <p class="text-green-400">Hello</p>
    <p class="text-green-500">Hello</p>
    <p class="text-green-600">Hello</p>
    <p class="text-green-700">Hello</p>
    <p class="text-green-800">Hello</p>
    <p class="text-green-900">Hello</p>
    <br>
    <hr>
    <br>
    <h1> BG Colors</h1>
    <p class ="bg-cyan-300 text-yellow-800">A BG will appear</p>
    <p class ="bg-green-700 text-white">A BG will appear</p>
    <br>
    <hr>
    <br>
    <h1>Text Decoration as well!</h1>
    <div class="line-through">Line Through</div>
    <br>
    <div class="underline decoration-red-300 text-cyan-700">UnderLine</div>
    <br>
    <div class="overline">OverLine</div>
    <br>
    <hr>
    <br>
    <h1>Accent Colors</h1>
    <input type="checkbox" class ="accent-blue-400" checked/>
    <input type="checkbox" class ="accent-lime-400" checked />
    <input type="checkbox" class ="accent-violet-400" checked/>
    <input type="checkbox" class ="accent-red-400" checked/>
    <input type="checkbox" class ="accent-yellow-400" checked/>


    
</body>
</html>
